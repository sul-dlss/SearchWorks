all_search: Mirsky, Mark. Mark Mirsky letters to Albert J. Guérard, 1970-1995. 30
  letters. Mirsky was a student in Guérard's writing class at Harvard. He was co-founder
  of the publishing house Fiction Collective, and was the founder and is the editor
  of the magazine Fiction. He has written novels and non-fiction books. He is Professor
  of English at the City College of New York. Some of the letters concern his efforts
  to help STILL TALKING find a publisher and some with his own frustrations with publishers.
  Among Mirsky's New York friends are Grace Paley, Cynthia Ozick, the late Donald
  Barthelm, Jerome Charyn and (not in New York) John Hawkes. Gift of Albert G. Guérard,
  1998. Barthelm, Donald. Charyn, Jerome. Guérard, Albert J. (Albert Joseph), 1914-2000
  Hawkes, John, 1925-1998. Mirskiĭ, M. (Mark) Ozick, Cynthia. Paley, Grace. American
  literature 20th century. 21 Guérard collections
